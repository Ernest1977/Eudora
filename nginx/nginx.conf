# ============================================
# Nginx — Reverse Proxy principal (VPS)
# ============================================
# Ce fichier configure Nginx comme point d'entrée unique :
#   - Sert le frontend React (fichiers statiques)
#   - Proxy les requêtes /api/* vers le backend Flask
#   - Proxy les fichiers uploadés /uploads/* vers le backend
#   - Gère le SSL avec Let's Encrypt (à activer)
# ============================================

upstream backend {
    server backend:5000;
}

# --- Redirection HTTP → HTTPS (décommenter après certificat SSL) ---
# server {
#     listen 80;
#     server_name ecrelooking.com www.ecrelooking.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;  # Décommenter après SSL
    server_name ecrelooking.com www.ecrelooking.com;

    # --- SSL (décommenter après certbot) ---
    # ssl_certificate /etc/letsencrypt/live/ecrelooking.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ecrelooking.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_prefer_server_ciphers on;

    # --- Sécurité headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:;" always;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript
        image/svg+xml
        application/font-woff
        application/font-woff2;

    # --- Frontend (fichiers statiques) ---
    root /usr/share/nginx/html;
    index index.html;

    # Cache long pour les assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- Backend API + Swagger docs (proxy) ---
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        client_max_body_size 16M;
    }

    # --- Fichiers uploadés (proxy vers backend) ---
    location /uploads/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 30d;
        add_header Cache-Control "public";
    }

    # --- SPA fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Let's Encrypt challenge ---
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # --- Bloquer l'accès aux fichiers sensibles ---
    location ~ /\. {
        deny all;
        return 404;
    }
}
